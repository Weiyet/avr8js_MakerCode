<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AVR8js Electron Playground</title>
</head>

<body>
  <div id="root"></div>
  <script>
    // Backend selection: ?api=https://your-backend (persisted in localStorage).
    // Defaults to the live MakerCode backend, so this works with no setup;
    // pass ?api=http://localhost:8000 to point at a local backend instead.
    (function () {
      var DEFAULT_API = 'https://stingray-app-g8ivf.ondigitalocean.app';
      var api = new URLSearchParams(location.search).get('api');
      if (api) { localStorage.setItem('makercode_api_base', api); }
      window.API_BASE_URL = api || localStorage.getItem('makercode_api_base') || DEFAULT_API;
    })();
  </script>
  <script type="module" src="/src/renderer/index.tsx"></script>
</body>

</html>
